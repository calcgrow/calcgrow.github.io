                </div>
            </div>
        </div>

        <div id="tool-thumbnail" class="tool-section hidden">

                    <img id="thumb-prev" src="https://via.placeholder.com/640x360?text=Thumbnail+Preview" class="w-full h-full object-cover">
                </div>
                <div>
                    <h3 class="text-2xl font-bold mb-4">Download Assets</h3>
                    <div class="space-y-4">
                        <button class="w-full flex justify-between items-center bg-slate-900 text-white p-4 rounded-xl font-bold">

                        <button class="bg-slate-100 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-200">Download .TXT</button>
                    </div>
                </div>
                <div class="bg-slate-50 p-6 rounded-2xl border border-dashed border-slate-300 min-h-[300px] text-slate-500 leading-relaxed">
                    Paste the video link above to extract the full transcript instantly...
                </div>
            </div>
        </div>

    </main>

    <script>
        function showTool(toolId) {
            // Hide all tools
            document.querySelectorAll('.tool-section').forEach(section => section.classList.add('hidden'));
            // Remove active tab style
            document.querySelectorAll('button[id^="tab-"]').forEach(tab => {
                tab.classList.remove('tab-active');
                tab.classList.add('text-slate-400');
            });

            // Show selected tool
            document.getElementById('tool-' + toolId).classList.remove('hidden');
            // Add active tab style
            document.getElementById('tab-' + toolId).classList.add('tab-active');
            document.getElementById('tab-' + toolId).classList.remove('text-slate-400');
        }

        function processRequest() {
            // This is where the magic happens
            const url = document.getElementById('videoUrl').value;
            if(!url) { alert("Please paste a link first!"); return; }

            alert("Fetching Channel Branding & Data...");

        }
    </script>
